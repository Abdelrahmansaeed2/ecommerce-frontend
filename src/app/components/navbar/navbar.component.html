<header class="app-navbar">
  <div class="navbar-inner">
      <section class="flex-center" style="gap: 32px;">
          <span class="brand" routerLink="/">LUXE</span>
          <nav class="nav-links desktop-only">
              <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">Home</a>
              <a routerLink="/shop" routerLinkActive="active" class="nav-link">Shop</a>
          </nav>
      </section>
      <menu class="nav-actions">
          <form class="search-box">
             <span class="material-symbols-outlined search-icon">search</span>
             <input #searchInput (keyup.enter)="onSearch(searchInput.value)" type="text" placeholder="Search aesthetics..." class="search-input">
          </form>
          <button class="icon-btn icon-btn-primary" routerLink="/cart">
              <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shopping_cart</span>
              <span class="cart-badge" *ngIf="count > 0">{{ count }}</span>
          </button>
          <button class="icon-btn" routerLink="/profile"><span class="material-symbols-outlined">person</span></button>
      </menu>
  </div>
</header>
