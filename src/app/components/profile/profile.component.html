<main class="flex-grow pt-12 pb-xxl max-w-container-max mx-auto w-full px-gutter md:px-lg grid grid-cols-1 md:grid-cols-4 gap-xl">
  
  <!-- Sidebar -->
  <aside class="md:col-span-1 flex flex-col gap-sm">
      <section class="bg-surface-container-lowest rounded-xl p-md shadow-sm mb-lg border border-outline-variant/30">
          <header class="flex items-center gap-md mb-lg">
              <figure class="w-16 h-16 rounded-full bg-primary text-white flex items-center justify-center text-2xl font-bold m-0">
                  {{ user.name.charAt(0) }}
              </figure>
              <div>
                  <h2 class="font-h3 text-h3 text-on-surface m-0">{{ user.name }}</h2>
                  <p class="font-body-sm text-body-sm text-on-surface-variant m-0">{{ user.email }}</p>
              </div>
          </header>
          <nav class="flex flex-col gap-xs">
              <button (click)="activeTab = 'personal'" [class.bg-surface-variant]="activeTab === 'personal'" [class.text-on-surface]="activeTab === 'personal'" class="flex items-center gap-md px-md py-sm rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-colors font-button text-button w-full text-left">
                  <span class="material-symbols-outlined">person</span> Personal Info
              </button>
              <button (click)="activeTab = 'orders'" [class.bg-surface-variant]="activeTab === 'orders'" [class.text-on-surface]="activeTab === 'orders'" class="flex items-center gap-md px-md py-sm rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-colors font-button text-button w-full text-left">
                  <span class="material-symbols-outlined">receipt_long</span> Order History
              </button>
              <hr class="border-t border-outline-variant my-sm w-full" />
              <button (click)="logout()" class="flex items-center gap-md px-md py-sm rounded-lg text-error hover:bg-error-container transition-colors font-button text-button w-full text-left">
                  <span class="material-symbols-outlined">logout</span> Logout
              </button>
          </nav>
      </section>
  </aside>

  <!-- Content -->
  <section class="md:col-span-3 flex flex-col gap-lg">
      
      <!-- Personal Info Tab -->
      <article *ngIf="activeTab === 'personal'">
          <section class="bg-surface-container-lowest rounded-xl p-lg shadow-sm border border-outline-variant/30 mb-lg">
              <h2 class="font-h2 text-h2 text-on-surface mb-md">Personal Information</h2>
              
              <!-- View Mode -->
              <fieldset class="grid grid-cols-1 md:grid-cols-2 gap-lg border-0 p-0 m-0" *ngIf="!isEditing">
                  <p class="flex flex-col gap-xs m-0">
                      <label class="font-label-caps text-label-caps text-on-surface-variant">Full Name</label>
                      <span class="font-body-md text-body-md text-on-surface p-sm border border-outline-variant rounded-lg bg-surface-container-lowest">{{ user.name }}</span>
                  </p>
                  <p class="flex flex-col gap-xs m-0">
                      <label class="font-label-caps text-label-caps text-on-surface-variant">Email Address</label>
                      <span class="font-body-md text-body-md text-on-surface p-sm border border-outline-variant rounded-lg bg-surface-container-lowest">{{ user.email }}</span>
                  </p>
                  <p class="flex flex-col gap-xs m-0">
                      <label class="font-label-caps text-label-caps text-on-surface-variant">Phone Number</label>
                      <span class="font-body-md text-body-md text-on-surface p-sm border border-outline-variant rounded-lg bg-surface-container-lowest">{{ user.phone }}</span>
                  </p>
              </fieldset>

              <!-- Edit Mode -->
              <fieldset class="grid grid-cols-1 md:grid-cols-2 gap-lg border-0 p-0 m-0" *ngIf="isEditing">
                  <p class="flex flex-col gap-xs m-0">
                      <label class="font-label-caps text-label-caps text-on-surface-variant">Full Name</label>
                      <input [(ngModel)]="user.name" class="font-body-md text-body-md text-on-surface p-sm border border-outline-variant rounded-lg bg-white outline-none focus:border-primary" />
                  </p>
                  <p class="flex flex-col gap-xs m-0">
                      <label class="font-label-caps text-label-caps text-on-surface-variant">Email Address</label>
                      <input [(ngModel)]="user.email" class="font-body-md text-body-md text-on-surface p-sm border border-outline-variant rounded-lg bg-white outline-none focus:border-primary" />
                  </p>
                  <p class="flex flex-col gap-xs m-0">
                      <label class="font-label-caps text-label-caps text-on-surface-variant">Phone Number</label>
                      <input [(ngModel)]="user.phone" class="font-body-md text-body-md text-on-surface p-sm border border-outline-variant rounded-lg bg-white outline-none focus:border-primary" />
                  </p>
              </fieldset>

              <menu class="mt-lg flex justify-end gap-md p-0 m-0 pt-6">
                  <button *ngIf="isEditing" (click)="toggleEdit()" class="text-on-surface-variant px-md py-sm rounded-lg font-button text-button hover:bg-surface-container-highest transition-colors">Cancel</button>
                  <button *ngIf="isEditing" (click)="saveProfile()" class="bg-primary text-white px-md py-sm rounded-lg font-button text-button transition-colors">Save Changes</button>
                  <button *ngIf="!isEditing" (click)="toggleEdit()" class="bg-surface-variant text-on-surface px-md py-sm rounded-lg font-button text-button hover:bg-surface-container-highest transition-colors border border-outline-variant">Edit Details</button>
              </menu>
          </section>

          <!-- Addresses -->
          <section class="bg-surface-container-lowest rounded-xl p-lg shadow-sm border border-outline-variant/30">
              <header class="flex justify-between items-center mb-md">
                  <h2 class="font-h2 text-h2 text-on-surface m-0">Shipping Addresses</h2>
                  <button (click)="addAddress()" class="text-primary hover:text-primary-container font-button text-button flex items-center gap-xs">
                      <span class="material-symbols-outlined text-[18px]">add</span> Add New
                  </button>
              </header>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-md">
                  <address *ngFor="let address of addresses" [class.border-primary]="address.isDefault" [class.bg-surface-container-low]="address.isDefault" class="border border-outline-variant rounded-lg p-md relative bg-white not-italic">
                      <span *ngIf="address.isDefault" class="absolute top-md right-md bg-primary text-on-primary font-label-caps text-[10px] px-2 py-1 rounded-full">DEFAULT</span>
                      <h3 class="font-h3 text-[16px] text-on-surface mb-xs mt-0">{{ address.type }}</h3>
                      <p class="font-body-sm text-body-sm text-on-surface-variant m-0">{{ address.line1 }}</p>
                      <p class="font-body-sm text-body-sm text-on-surface-variant m-0">{{ address.city }}, {{ address.country }}</p>
                      <menu class="mt-md flex gap-md p-0 m-0 pt-4">
                          <button class="text-error hover:text-on-error-container font-button text-sm transition-colors" (click)="deleteAddress(address.id)">Delete</button>
                      </menu>
                  </address>
              </div>
          </section>
      </article>

      <!-- Order History Tab -->
      <article *ngIf="activeTab === 'orders'" class="bg-surface-container-lowest rounded-xl p-lg shadow-sm border border-outline-variant/30">
          <h2 class="font-h2 text-h2 text-on-surface mb-md">Order History</h2>
          <div class="text-center py-xl text-on-surface-variant">
             <span class="material-symbols-outlined text-4xl mb-sm" style="font-size: 48px;">receipt_long</span>
             <p>No past orders found.</p>
          </div>
      </article>
  </section>
</main>
